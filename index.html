<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Church Pickup</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
padding:40px;
text-align:center;
}

input{
display:block;
margin:15px auto;
padding:12px;
width:250px;
font-size:16px;
}

button{
padding:12px 20px;
font-size:16px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h2>Request Church Pickup</h2>

<form id="pickupForm">

<input
type="text"
id="name"
placeholder="Your Name"
required
>

<input 
  type="text"
  id="address"
  placeholder="Street Address"
  autocomplete="street-address"
  list="addressSuggestions"
  required
>

<datalist id="addressSuggestions"></datalist>

<button type="submit">
Request Pickup
</button>

</form>

<script src="app.js"></script>

</body>

</html>
